<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Coachs | Admin Titanium Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #0A0A0A; color: #FFFFFF; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #111111;
            border-right: 1px solid rgba(255,107,0,0.2);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s;
        }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,107,0,0.2); }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #FF6B00, #FF3B30); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo-icon i { font-size: 1.8rem; color: white; }
        .sidebar-header h3 { font-size: 1.2rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .sidebar-header p { font-size: 0.65rem; opacity: 0.7; }
        .sidebar-nav { padding: 20px 0; }
        .nav-item { padding: 12px 25px; display: flex; align-items: center; gap: 15px; color: #B0B0B0; text-decoration: none; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,107,0,0.1); color: #FF6B00; border-left: 4px solid #FF6B00; }
        .nav-item i { width: 22px; }
        
        .main-content { margin-left: 280px; padding: 20px; min-height: 100vh; }
        .top-bar { background: #111111; border-radius: 16px; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid rgba(255,107,0,0.1); }
        .logout-btn { background: #FF3B30; color: white; border: none; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .stats-coachs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #111111; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(255,107,0,0.1); }
        .stat-card i { font-size: 2rem; color: #FF6B00; margin-bottom: 10px; }
        .stat-card h3 { font-size: 1.8rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .stat-card p { color: #B0B0B0; font-size: 0.8rem; }
        
        .data-table { background: #111111; border-radius: 20px; padding: 20px; border: 1px solid rgba(255,107,0,0.1); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-input { padding: 10px 18px; border: 1px solid rgba(255,107,0,0.2); border-radius: 12px; width: 250px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .btn-add { background: #00FF87; color: #0A0A0A; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-add:hover { background: #00CC6A; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #FF6B00; font-weight: 700; }
        tr:hover { background: rgba(255,107,0,0.05); }
        
        .coach-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .btn-edit { background: #FF6B00; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 5px; transition: all 0.3s; }
        .btn-edit:hover { background: #E05A00; transform: translateY(-2px); }
        .btn-delete { background: #FF3B30; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-delete:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: #111111; border-radius: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,107,0,0.2); animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { background: linear-gradient(135deg, #FF6B00, #FF3B30); padding: 20px 25px; border-radius: 24px 24px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.2rem; color: white; }
        .modal-close { cursor: pointer; font-size: 1.5rem; color: white; transition: all 0.3s; }
        .modal-close:hover { color: #0A0A0A; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #FFFFFF; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,107,0,0.2); border-radius: 10px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #FF6B00; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .image-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-top: 10px; border: 2px solid #FF6B00; }
        .modal-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 12px; }
        
        .empty-state { text-align: center; padding: 50px; color: #6B6B6B; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        
        @media (max-width: 768px) {
            .sidebar { left: -280px; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 101; background: #FF6B00; color: white; padding: 10px; border-radius: 10px; cursor: pointer; }
            .stats-coachs { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menuToggle" style="display:none;"><i class="fas fa-bars"></i></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
            <h3>TITANIUM GYM</h3>
            <p>ESPACE ADMIN</p>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="membres.html" class="nav-item"><i class="fas fa-users"></i><span>Membres</span></a>
            <a href="coachs.html" class="nav-item active"><i class="fas fa-chalkboard-user"></i><span>Coachs</span></a>
            <a href="services.html" class="nav-item"><i class="fas fa-dumbbell"></i><span>Services</span></a>
            <a href="horaires.html" class="nav-item"><i class="fas fa-clock"></i><span>Horaires</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Déconnexion</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h2><i class="fas fa-chalkboard-user"></i> Gestion des coachs</h2></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
        
        <div class="stats-coachs" id="statsCoachs">
            <div class="stat-card"><i class="fas fa-chalkboard-user"></i><h3 id="totalCoachs">0</h3><p>Total coachs</p></div>
            <div class="stat-card"><i class="fas fa-star"></i><h3 id="specialites">0</h3><p>Spécialités</p></div>
            <div class="stat-card"><i class="fas fa-clock"></i><h3 id="moyenneExp">0</h3><p>Expérience moyenne</p></div>
        </div>
        
        <div class="data-table">
            <div class="table-header">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher...">
                <button class="btn-add" onclick="openAddModal()"><i class="fas fa-plus"></i> Ajouter un coach</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="coachsTable">
                    <thead>
                        <tr><th>Photo</th><th>Nom</th><th>Spécialité</th><th>Expérience</th><th>Contact</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="coachsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="coachModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Ajouter un coach</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="coachId">
                <div class="form-row">
                    <div class="form-group"><label>Nom complet *</label><input type="text" id="coachNom" placeholder="Nom et prénom" required></div>
                    <div class="form-group"><label>Spécialité *</label><input type="text" id="coachSpecialite" placeholder="Ex: Musculation, Yoga, CrossFit" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Années d'expérience</label><input type="text" id="coachExperience" placeholder="Ex: 10 ans"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="coachEmail" placeholder="email@coach.com"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Téléphone</label><input type="tel" id="coachTel" placeholder="06 XX XX XX XX"></div>
                    <div class="form-group"><label>Diplôme</label><input type="text" id="coachDiplome" placeholder="Ex: BPJEPS, Master"></div>
                </div>
                <div class="form-group"><label>Biographie</label><textarea id="coachBio" rows="3" placeholder="Courte biographie du coach..."></textarea></div>
                <div class="form-group"><label>URL Photo</label><input type="text" id="coachPhoto" placeholder="https://..."><img id="imagePreview" class="image-preview" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="closeModal()">Annuler</button>
                <button class="btn-add" onclick="saveCoach()">Enregistrer</button>
            </div>
        </div>
    </div>
    
    <script>
        function checkAuth() { const isLoggedIn = localStorage.getItem('adminLoggedIn'); if (!isLoggedIn) window.location.href = 'login.html'; }
        function logout() { localStorage.removeItem('adminLoggedIn'); localStorage.removeItem('adminUser'); window.location.href = 'login.html'; }
        
        function getCoachs() { return JSON.parse(localStorage.getItem('coachs_gym') || '[]'); }
        function saveCoachs(data) { localStorage.setItem('coachs_gym', JSON.stringify(data)); }
        
        let currentCoachs = [];
        
        function loadCoachs() {
            currentCoachs = getCoachs();
            updateStats();
            renderTable(currentCoachs);
        }
        
        function updateStats() {
            const total = currentCoachs.length;
            const specialites = [...new Set(currentCoachs.map(c => c.specialite))].length;
            let totalExp = 0;
            currentCoachs.forEach(c => { const expMatch = c.experience ? c.experience.match(/\d+/) : null; if(expMatch) totalExp += parseInt(expMatch[0]); });
            const moyExp = total > 0 ? Math.round(totalExp / total) : 0;
            document.getElementById('totalCoachs').innerText = total;
            document.getElementById('specialites').innerText = specialites;
            document.getElementById('moyenneExp').innerText = moyExp;
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('coachsTableBody');
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><i class="fas fa-chalkboard-user"></i><br>Aucun coach<br><button class="btn-add" style="margin-top:15px;" onclick="openAddModal()">Ajouter le premier coach</button></td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td><img src="${c.photo || 'https://placehold.co/45x45/FF6B00/white?text=C'}" class="coach-img" onerror="this.src='https://placehold.co/45x45/FF6B00/white?text=C'"></td>
                    <td><strong>${escapeHtml(c.nom) || '-'}</strong></td>
                    <td><span style="color:#FF6B00;">${escapeHtml(c.specialite) || '-'}</span></td>
                    <td>${escapeHtml(c.experience) || '-'}</td>
                    <td><small>${escapeHtml(c.email) || '-'}<br>${escapeHtml(c.telephone) || '-'}</small></td>
                    <td><button class="btn-edit" onclick="openEditModal(${c.id})"><i class="fas fa-edit"></i></button><button class="btn-delete" onclick="deleteCoach(${c.id})"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = '➕ Ajouter un coach';
            document.getElementById('coachId').value = '';
            document.getElementById('coachNom').value = '';
            document.getElementById('coachSpecialite').value = '';
            document.getElementById('coachExperience').value = '';
            document.getElementById('coachEmail').value = '';
            document.getElementById('coachTel').value = '';
            document.getElementById('coachDiplome').value = '';
            document.getElementById('coachBio').value = '';
            document.getElementById('coachPhoto').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('coachModal').classList.add('show');
        }
        
        function openEditModal(id) {
            const coach = currentCoachs.find(c => c.id === id);
            if(coach) {
                document.getElementById('modalTitle').innerText = '✏️ Modifier le coach';
                document.getElementById('coachId').value = coach.id;
                document.getElementById('coachNom').value = coach.nom || '';
                document.getElementById('coachSpecialite').value = coach.specialite || '';
                document.getElementById('coachExperience').value = coach.experience || '';
                document.getElementById('coachEmail').value = coach.email || '';
                document.getElementById('coachTel').value = coach.telephone || '';
                document.getElementById('coachDiplome').value = coach.diplome || '';
                document.getElementById('coachBio').value = coach.bio || '';
                document.getElementById('coachPhoto').value = coach.photo || '';
                const preview = document.getElementById('imagePreview');
                if(coach.photo) { preview.src = coach.photo; preview.style.display = 'block'; }
                else preview.style.display = 'none';
                document.getElementById('coachModal').classList.add('show');
            }
        }
        
        function saveCoach() {
            const id = document.getElementById('coachId').value;
            const nom = document.getElementById('coachNom').value.trim();
            const specialite = document.getElementById('coachSpecialite').value.trim();
            if(!nom || !specialite) { showToast('Le nom et la spécialité sont requis', 'error'); return; }
            
            const coach = {
                nom, specialite,
                experience: document.getElementById('coachExperience').value,
                email: document.getElementById('coachEmail').value,
                telephone: document.getElementById('coachTel').value,
                diplome: document.getElementById('coachDiplome').value,
                bio: document.getElementById('coachBio').value,
                photo: document.getElementById('coachPhoto').value || 'https://placehold.co/100x100/FF6B00/white?text=C',
                dateModification: new Date().toISOString()
            };
            
            let coachs = getCoachs();
            if(id) {
                const index = coachs.findIndex(c => c.id === parseInt(id));
                if(index !== -1) { coachs[index] = { ...coachs[index], ...coach }; showToast('Coach modifié avec succès'); }
            } else {
                const newId = coachs.length > 0 ? Math.max(...coachs.map(c => c.id)) + 1 : 1;
                coachs.push({ id: newId, ...coach, dateCreation: new Date().toISOString() });
                showToast('Coach ajouté avec succès');
            }
            saveCoachs(coachs);
            closeModal();
            loadCoachs();
        }
        
        function deleteCoach(id) {
            if(confirm('⚠️ Supprimer définitivement ce coach ?')) {
                let coachs = getCoachs();
                coachs = coachs.filter(c => c.id !== id);
                saveCoachs(coachs);
                loadCoachs();
                showToast('Coach supprimé');
            }
        }
        
        function closeModal() { document.getElementById('coachModal').classList.remove('show'); }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:${type === 'success' ? '#00FF87' : '#FF3B30'};color:${type === 'success' ? '#0A0A0A' : 'white'};padding:12px 20px;border-radius:12px;z-index:9999;`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = currentCoachs.filter(c => (c.nom && c.nom.toLowerCase().includes(search)) || (c.specialite && c.specialite.toLowerCase().includes(search)));
            renderTable(filtered);
        });
        
        document.getElementById('coachPhoto').addEventListener('input', (e) => {
            const preview = document.getElementById('imagePreview');
            if(e.target.value) { preview.src = e.target.value; preview.style.display = 'block'; }
            else preview.style.display = 'none';
        });
        
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        function initData() { if(!localStorage.getItem('coachs_gym')) localStorage.setItem('coachs_gym', '[]'); }
        
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if(menuToggle) {
            menuToggle.style.display = 'block';
            menuToggle.addEventListener('click', () => { sidebar.classList.toggle('active'); if(sidebar.classList.contains('active')) sidebar.style.left = '0'; else sidebar.style.left = '-280px'; });
        }
        
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); initData(); loadCoachs(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Services | Admin Titanium Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #0A0A0A; color: #FFFFFF; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #111111;
            border-right: 1px solid rgba(255,107,0,0.2);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s;
        }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,107,0,0.2); }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #FF6B00, #FF3B30); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo-icon i { font-size: 1.8rem; color: white; }
        .sidebar-header h3 { font-size: 1.2rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .sidebar-header p { font-size: 0.65rem; opacity: 0.7; }
        .sidebar-nav { padding: 20px 0; }
        .nav-item { padding: 12px 25px; display: flex; align-items: center; gap: 15px; color: #B0B0B0; text-decoration: none; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,107,0,0.1); color: #FF6B00; border-left: 4px solid #FF6B00; }
        .nav-item i { width: 22px; }
        
        .main-content { margin-left: 280px; padding: 20px; min-height: 100vh; }
        .top-bar { background: #111111; border-radius: 16px; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid rgba(255,107,0,0.1); }
        .logout-btn { background: #FF3B30; color: white; border: none; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .stats-services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #111111; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(255,107,0,0.1); }
        .stat-card i { font-size: 2rem; color: #FF6B00; margin-bottom: 10px; }
        .stat-card h3 { font-size: 1.8rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .stat-card p { color: #B0B0B0; font-size: 0.8rem; }
        
        .data-table { background: #111111; border-radius: 20px; padding: 20px; border: 1px solid rgba(255,107,0,0.1); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-input { padding: 10px 18px; border: 1px solid rgba(255,107,0,0.2); border-radius: 12px; width: 250px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .btn-add { background: #00FF87; color: #0A0A0A; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-add:hover { background: #00CC6A; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #FF6B00; font-weight: 700; }
        tr:hover { background: rgba(255,107,0,0.05); }
        
        .service-icon-small { width: 40px; height: 40px; background: rgba(255,107,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .service-icon-small i { font-size: 1.2rem; color: #FF6B00; }
        
        .btn-edit { background: #FF6B00; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 5px; transition: all 0.3s; }
        .btn-edit:hover { background: #E05A00; transform: translateY(-2px); }
        .btn-delete { background: #FF3B30; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-delete:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: #111111; border-radius: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,107,0,0.2); animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { background: linear-gradient(135deg, #FF6B00, #FF3B30); padding: 20px 25px; border-radius: 24px 24px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.2rem; color: white; }
        .modal-close { cursor: pointer; font-size: 1.5rem; color: white; transition: all 0.3s; }
        .modal-close:hover { color: #0A0A0A; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #FFFFFF; font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,107,0,0.2); border-radius: 10px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #FF6B00; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .modal-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 12px; }
        
        .empty-state { text-align: center; padding: 50px; color: #6B6B6B; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        
        @media (max-width: 768px) {
            .sidebar { left: -280px; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 101; background: #FF6B00; color: white; padding: 10px; border-radius: 10px; cursor: pointer; }
            .stats-services { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menuToggle" style="display:none;"><i class="fas fa-bars"></i></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
            <h3>TITANIUM GYM</h3>
            <p>ESPACE ADMIN</p>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="membres.html" class="nav-item"><i class="fas fa-users"></i><span>Membres</span></a>
            <a href="coachs.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Coachs</span></a>
            <a href="services.html" class="nav-item active"><i class="fas fa-dumbbell"></i><span>Services</span></a>
            <a href="horaires.html" class="nav-item"><i class="fas fa-clock"></i><span>Horaires</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Déconnexion</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h2><i class="fas fa-dumbbell"></i> Gestion des services</h2></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
        
        <div class="stats-services" id="statsServices">
            <div class="stat-card"><i class="fas fa-dumbbell"></i><h3 id="totalServices">0</h3><p>Services</p></div>
            <div class="stat-card"><i class="fas fa-eye"></i><h3 id="servicesActifs">0</h3><p>Services actifs</p></div>
            <div class="stat-card"><i class="fas fa-star"></i><h3 id="servicesPopulaires">0</h3><p>Populaires</p></div>
        </div>
        
        <div class="data-table">
            <div class="table-header">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher...">
                <button class="btn-add" onclick="openAddModal()"><i class="fas fa-plus"></i> Ajouter un service</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="servicesTable">
                    <thead>
                        <tr><th>Icône</th><th>Titre</th><th>Description</th><th>Statut</th><th>Popularité</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="servicesTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Ajouter un service</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="serviceId">
                <div class="form-row">
                    <div class="form-group"><label>Titre *</label><input type="text" id="serviceTitre" placeholder="Ex: Musculation" required></div>
                    <div class="form-group"><label>Icône (Font Awesome)</label><input type="text" id="serviceIcone" placeholder="fas fa-dumbbell"></div>
                </div>
                <div class="form-group"><label>Description *</label><textarea id="serviceDescription" rows="3" placeholder="Description détaillée..." required></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>Statut</label>
                        <select id="serviceStatut">
                            <option value="actif">Actif</option>
                            <option value="inactif">Inactif</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Popularité</label>
                        <select id="servicePopularite">
                            <option value="0">Normal</option>
                            <option value="1">⭐ Populaire</option>
                            <option value="2">🔥 Très populaire</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Image URL</label><input type="text" id="serviceImage" placeholder="https://..."></div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="closeModal()">Annuler</button>
                <button class="btn-add" onclick="saveService()">Enregistrer</button>
            </div>
        </div>
    </div>
    
    <script>
        function checkAuth() { const isLoggedIn = localStorage.getItem('adminLoggedIn'); if (!isLoggedIn) window.location.href = 'login.html'; }
        function logout() { localStorage.removeItem('adminLoggedIn'); localStorage.removeItem('adminUser'); window.location.href = 'login.html'; }
        
        function getServices() { return JSON.parse(localStorage.getItem('services_gym') || '[]'); }
        function saveServices(data) { localStorage.setItem('services_gym', JSON.stringify(data)); }
        
        let currentServices = [];
        
        function loadServices() {
            currentServices = getServices();
            updateStats();
            renderTable(currentServices);
        }
        
        function updateStats() {
            const total = currentServices.length;
            const actifs = currentServices.filter(s => s.statut === 'actif').length;
            const populaires = currentServices.filter(s => s.popularite && s.popularite > 0).length;
            document.getElementById('totalServices').innerText = total;
            document.getElementById('servicesActifs').innerText = actifs;
            document.getElementById('servicesPopulaires').innerText = populaires;
        }
        
        function getIconHtml(icone) {
            if(!icone) return '<i class="fas fa-dumbbell"></i>';
            return `<i class="${icone}"></i>`;
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('servicesTableBody');
            if(data.length === 0) {
                tbody.innerHTML = `<td><td colspan="6" class="empty-state"><i class="fas fa-dumbbell"></i><br>Aucun service<br><button class="btn-add" style="margin-top:15px;" onclick="openAddModal()">Ajouter le premier service</button></td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td><div class="service-icon-small">${getIconHtml(s.icone)}</div></td>
                    <td><strong>${escapeHtml(s.titre) || '-'}</strong></td>
                    <td>${escapeHtml(s.description ? s.description.substring(0, 60) + (s.description.length > 60 ? '...' : '') : '-')}</td>
                    <td><span class="badge ${s.statut === 'actif' ? 'badge-success' : 'badge-danger'}">${s.statut === 'actif' ? 'Actif' : 'Inactif'}</span></td>
                    <td>${s.popularite == 1 ? '⭐ Populaire' : s.popularite == 2 ? '🔥 Très populaire' : 'Normal'}</td>
                    <td><button class="btn-edit" onclick="openEditModal(${s.id})"><i class="fas fa-edit"></i></button><button class="btn-delete" onclick="deleteService(${s.id})"><i class="fas fa-trash"></i></button></td>
                </tr>`).join('');
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = '➕ Ajouter un service';
            document.getElementById('serviceId').value = '';
            document.getElementById('serviceTitre').value = '';
            document.getElementById('serviceIcone').value = 'fas fa-dumbbell';
            document.getElementById('serviceDescription').value = '';
            document.getElementById('serviceStatut').value = 'actif';
            document.getElementById('servicePopularite').value = '0';
            document.getElementById('serviceImage').value = '';
            document.getElementById('serviceModal').classList.add('show');
        }
        
        function openEditModal(id) {
            const service = currentServices.find(s => s.id === id);
            if(service) {
                document.getElementById('modalTitle').innerText = '✏️ Modifier le service';
                document.getElementById('serviceId').value = service.id;
                document.getElementById('serviceTitre').value = service.titre || '';
                document.getElementById('serviceIcone').value = service.icone || 'fas fa-dumbbell';
                document.getElementById('serviceDescription').value = service.description || '';
                document.getElementById('serviceStatut').value = service.statut || 'actif';
                document.getElementById('servicePopularite').value = service.popularite || '0';
                document.getElementById('serviceImage').value = service.image || '';
                document.getElementById('serviceModal').classList.add('show');
            }
        }
        
        function saveService() {
            const id = document.getElementById('serviceId').value;
            const titre = document.getElementById('serviceTitre').value.trim();
            const description = document.getElementById('serviceDescription').value.trim();
            if(!titre || !description) { showToast('Le titre et la description sont requis', 'error'); return; }
            
            const service = {
                titre: titre,
                icone: document.getElementById('serviceIcone').value,
                description: description,
                statut: document.getElementById('serviceStatut').value,
                popularite: parseInt(document.getElementById('servicePopularite').value),
                image: document.getElementById('serviceImage').value,
                dateModification: new Date().toISOString()
            };
            
            let services = getServices();
            if(id) {
                const index = services.findIndex(s => s.id === parseInt(id));
                if(index !== -1) { services[index] = { ...services[index], ...service }; showToast('Service modifié avec succès'); }
            } else {
                const newId = services.length > 0 ? Math.max(...services.map(s => s.id)) + 1 : 1;
                services.push({ id: newId, ...service, dateCreation: new Date().toISOString() });
                showToast('Service ajouté avec succès');
            }
            saveServices(services);
            closeModal();
            loadServices();
        }
        
        function deleteService(id) {
            if(confirm('⚠️ Supprimer définitivement ce service ?')) {
                let services = getServices();
                services = services.filter(s => s.id !== id);
                saveServices(services);
                loadServices();
                showToast('Service supprimé');
            }
        }
        
        function closeModal() { document.getElementById('serviceModal').classList.remove('show'); }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:${type === 'success' ? '#00FF87' : '#FF3B30'};color:${type === 'success' ? '#0A0A0A' : 'white'};padding:12px 20px;border-radius:12px;z-index:9999;`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = currentServices.filter(s => (s.titre && s.titre.toLowerCase().includes(search)) || (s.description && s.description.toLowerCase().includes(search)));
            renderTable(filtered);
        });
        
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        function initData() {
            if(!localStorage.getItem('services_gym')) {
                const defaultServices = [
                    { id: 1, titre: "Musculation", icone: "fas fa-dumbbell", description: "Équipements dernier cri, machines Technogym, espace libre poids.", statut: "actif", popularite: 2, image: "https://images.pexels.com/photos/1954524/pexels-photo-1954524.jpeg?w=600" },
                    { id: 2, titre: "Cardio Training", icone: "fas fa-heartbeat", description: "Tapis, vélos, rameurs, elliptiques connectés.", statut: "actif", popularite: 1, image: "https://images.pexels.com/photos/841134/pexels-photo-841134.jpeg?w=600" },
                    { id: 3, titre: "CrossFit & Boxe", icone: "fas fa-hand-fist", description: "Zone CrossFit, sacs de frappe, ring. Cours collectifs intensifs.", statut: "actif", popularite: 1, image: "https://images.pexels.com/photos/3757947/pexels-photo-3757947.jpeg?w=600" },
                    { id: 4, titre: "Yoga & Pilates", icone: "fas fa-spa", description: "Salle dédiée, cours doux pour le bien-être.", statut: "actif", popularite: 0, image: "https://images.pexels.com/photos/260447/pexels-photo-260447.jpeg?w=600" },
                    { id: 5, titre: "Nutrition", icone: "fas fa-utensils", description: "Suivi personnalisé par des nutritionnistes.", statut: "actif", popularite: 0, image: "https://images.pexels.com/photos/4720258/pexels-photo-4720258.jpeg?w=600" },
                    { id: 6, titre: "Coaching perso", icone: "fas fa-person-running", description: "Séances individuelles avec nos meilleurs coachs.", statut: "actif", popularite: 1, image: "https://images.pexels.com/photos/3253501/pexels-photo-3253501.jpeg?w=600" }
                ];
                localStorage.setItem('services_gym', JSON.stringify(defaultServices));
            }
        }
        
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if(menuToggle) {
            menuToggle.style.display = 'block';
            menuToggle.addEventListener('click', () => { sidebar.classList.toggle('active'); if(sidebar.classList.contains('active')) sidebar.style.left = '0'; else sidebar.style.left = '-280px'; });
        }
        
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); initData(); loadServices(); });
    </script>
</body>
</html>

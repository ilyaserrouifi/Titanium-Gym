<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Membres | Admin Titanium Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #0A0A0A; color: #FFFFFF; }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: #111111;
            border-right: 1px solid rgba(255,107,0,0.2);
            z-index: 100;
            overflow-y: auto;
            transition: all 0.3s;
        }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,107,0,0.2); }
        .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #FF6B00, #FF3B30); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo-icon i { font-size: 1.8rem; color: white; }
        .sidebar-header h3 { font-size: 1.2rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .sidebar-header p { font-size: 0.65rem; opacity: 0.7; }
        .sidebar-nav { padding: 20px 0; }
        .nav-item { padding: 12px 25px; display: flex; align-items: center; gap: 15px; color: #B0B0B0; text-decoration: none; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,107,0,0.1); color: #FF6B00; border-left: 4px solid #FF6B00; }
        .nav-item i { width: 22px; }
        
        .main-content { margin-left: 280px; padding: 20px; min-height: 100vh; }
        .top-bar { background: #111111; border-radius: 16px; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid rgba(255,107,0,0.1); }
        .logout-btn { background: #FF3B30; color: white; border: none; padding: 8px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .stats-membres { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #111111; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid rgba(255,107,0,0.1); }
        .stat-card i { font-size: 2rem; color: #FF6B00; margin-bottom: 10px; }
        .stat-card h3 { font-size: 1.8rem; color: #FF6B00; font-family: 'Oswald', sans-serif; }
        .stat-card p { color: #B0B0B0; font-size: 0.8rem; }
        
        .data-table { background: #111111; border-radius: 20px; padding: 20px; border: 1px solid rgba(255,107,0,0.1); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-input { padding: 10px 18px; border: 1px solid rgba(255,107,0,0.2); border-radius: 12px; width: 250px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .btn-add { background: #00FF87; color: #0A0A0A; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-add:hover { background: #00CC6A; transform: translateY(-2px); }
        .btn-export { background: #FF6B00; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-left: 10px; transition: all 0.3s; }
        .btn-export:hover { background: #E05A00; transform: translateY(-2px); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #FF6B00; font-weight: 700; }
        tr:hover { background: rgba(255,107,0,0.05); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-success { background: rgba(0,255,135,0.2); color: #00FF87; }
        .badge-warning { background: rgba(255,107,0,0.2); color: #FF6B00; }
        .badge-danger { background: rgba(255,59,48,0.2); color: #FF3B30; }
        
        .btn-edit { background: #FF6B00; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-right: 5px; transition: all 0.3s; }
        .btn-edit:hover { background: #E05A00; transform: translateY(-2px); }
        .btn-delete { background: #FF3B30; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-delete:hover { background: #D32F2F; transform: translateY(-2px); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-content { background: #111111; border-radius: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,107,0,0.2); }
        .modal-header { background: linear-gradient(135deg, #FF6B00, #FF3B30); padding: 20px 25px; border-radius: 24px 24px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1.2rem; color: white; }
        .modal-close { cursor: pointer; font-size: 1.5rem; color: white; transition: all 0.3s; }
        .modal-close:hover { color: #0A0A0A; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #FFFFFF; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,107,0,0.2); border-radius: 10px; background: #0A0A0A; color: white; font-family: 'Montserrat', sans-serif; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #FF6B00; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .modal-footer { padding: 20px 25px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: flex-end; gap: 12px; }
        
        .empty-state { text-align: center; padding: 50px; color: #6B6B6B; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
        
        @media (max-width: 768px) {
            .sidebar { left: -280px; }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; position: fixed; top: 20px; left: 20px; z-index: 101; background: #FF6B00; color: white; padding: 10px; border-radius: 10px; cursor: pointer; }
            .stats-membres { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="menu-toggle" id="menuToggle" style="display:none;"><i class="fas fa-bars"></i></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
            <h3>TITANIUM GYM</h3>
            <p>ESPACE ADMIN</p>
        </div>
        <div class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="membres.html" class="nav-item active"><i class="fas fa-users"></i><span>Membres</span></a>
            <a href="coachs.html" class="nav-item"><i class="fas fa-chalkboard-user"></i><span>Coachs</span></a>
            <a href="services.html" class="nav-item"><i class="fas fa-dumbbell"></i><span>Services</span></a>
            <a href="horaires.html" class="nav-item"><i class="fas fa-clock"></i><span>Horaires</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Déconnexion</span></a>
        </div>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h2><i class="fas fa-users"></i> Gestion des membres</h2></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
        </div>
        
        <div class="stats-membres" id="statsMembres">
            <div class="stat-card"><i class="fas fa-user-graduate"></i><h3 id="totalMembres">0</h3><p>Total membres</p></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3 id="totalActifs">0</h3><p>Membres actifs</p></div>
            <div class="stat-card"><i class="fas fa-clock"></i><h3 id="totalAttente">0</h3><p>En attente</p></div>
            <div class="stat-card"><i class="fas fa-money-bill-wave"></i><h3 id="totalRevenu">0</h3><p>Revenu total (DH)</p></div>
        </div>
        
        <div class="data-table">
            <div class="table-header">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher par nom, email...">
                <div>
                    <button class="btn-add" onclick="openAddModal()"><i class="fas fa-plus"></i> Ajouter un membre</button>
                    <button class="btn-export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Exporter</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Nom</th><th>Email</th><th>Téléphone</th><th>Abonnement</th><th>Prix</th><th>Date</th><th>Statut</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="membresTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="membreModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Ajouter un membre</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <input type="hidden" id="membreId">
                <div class="form-row">
                    <div class="form-group"><label>Nom complet *</label><input type="text" id="membreNom" placeholder="Nom et prénom" required></div>
                    <div class="form-group"><label>Email *</label><input type="email" id="membreEmail" placeholder="email@exemple.com" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Téléphone</label><input type="tel" id="membreTel" placeholder="06 XX XX XX XX"></div>
                    <div class="form-group"><label>Date de naissance</label><input type="date" id="membreDateNaiss"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Abonnement *</label>
                        <select id="membreAbonnement">
                            <option value="Basic">Basic - 350 DH</option>
                            <option value="Pro">Pro - 550 DH</option>
                            <option value="Premium">Premium - 850 DH</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Prix (DH)</label><input type="number" id="membrePrix" placeholder="350"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Statut</label>
                        <select id="membreStatut">
                            <option>Actif</option>
                            <option>En attente</option>
                            <option>Suspendu</option>
                            <option>Expiré</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Date fin abonnement</label><input type="date" id="membreDateFin"></div>
                </div>
                <div class="form-group"><label>Adresse</label><textarea id="membreAdresse" rows="2" placeholder="Adresse complète"></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="closeModal()">Annuler</button>
                <button class="btn-add" onclick="saveMembre()">Enregistrer</button>
            </div>
        </div>
    </div>
    
    <script>
        function checkAuth() { const isLoggedIn = localStorage.getItem('adminLoggedIn'); if (!isLoggedIn) window.location.href = 'login.html'; }
        function logout() { localStorage.removeItem('adminLoggedIn'); localStorage.removeItem('adminUser'); window.location.href = 'login.html'; }
        
        function getMembres() { return JSON.parse(localStorage.getItem('inscriptions_gym') || '[]'); }
        function saveMembres(data) { localStorage.setItem('inscriptions_gym', JSON.stringify(data)); }
        
        let currentMembres = [];
        
        function loadMembres() {
            currentMembres = getMembres();
            updateStats();
            renderTable(currentMembres);
        }
        
        function updateStats() {
            const total = currentMembres.length;
            const actifs = currentMembres.filter(m => m.statut === 'Actif').length;
            const attente = currentMembres.filter(m => m.statut === 'En attente').length;
            const revenu = currentMembres.reduce((sum, m) => sum + (parseInt(m.prix) || 0), 0);
            document.getElementById('totalMembres').innerText = total;
            document.getElementById('totalActifs').innerText = actifs;
            document.getElementById('totalAttente').innerText = attente;
            document.getElementById('totalRevenu').innerText = revenu.toLocaleString();
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('membresTableBody');
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="empty-state"><i class="fas fa-user-graduate"></i><br>Aucun membre<br><button class="btn-add" style="margin-top:15px;" onclick="openAddModal()">Ajouter le premier membre</button></td></tr>`;
                return;
            }
            tbody.innerHTML = data.map((m, i) => `<tr>
                <td>${m.id || i+1}</td>
                <td><strong>${escapeHtml(m.nom) || '-'}</strong></td>
                <td>${escapeHtml(m.email) || '-'}</td>
                <td>${escapeHtml(m.telephone) || '-'}</td>
                <td>${escapeHtml(m.abonnement) || '-'}</td>
                <td>${m.prix || '-'} DH</td>
                <td>${m.date ? new Date(m.date).toLocaleDateString() : '-'}</td>
                <td><span class="badge ${m.statut === 'Actif' ? 'badge-success' : m.statut === 'En attente' ? 'badge-warning' : 'badge-danger'}">${m.statut || 'En attente'}</span></td>
                <td><button class="btn-edit" onclick="openEditModal(${m.id})"><i class="fas fa-edit"></i></button><button class="btn-delete" onclick="deleteMembre(${m.id})"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('');
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = '➕ Ajouter un membre';
            document.getElementById('membreId').value = '';
            document.getElementById('membreNom').value = '';
            document.getElementById('membreEmail').value = '';
            document.getElementById('membreTel').value = '';
            document.getElementById('membreDateNaiss').value = '';
            document.getElementById('membreAbonnement').value = 'Basic';
            document.getElementById('membrePrix').value = '350';
            document.getElementById('membreStatut').value = 'En attente';
            document.getElementById('membreDateFin').value = '';
            document.getElementById('membreAdresse').value = '';
            document.getElementById('membreModal').classList.add('show');
        }
        
        function openEditModal(id) {
            const membre = currentMembres.find(m => m.id === id);
            if(membre) {
                document.getElementById('modalTitle').innerText = '✏️ Modifier le membre';
                document.getElementById('membreId').value = membre.id;
                document.getElementById('membreNom').value = membre.nom || '';
                document.getElementById('membreEmail').value = membre.email || '';
                document.getElementById('membreTel').value = membre.telephone || '';
                document.getElementById('membreDateNaiss').value = membre.dateNaissance || '';
                document.getElementById('membreAbonnement').value = membre.abonnement || 'Basic';
                document.getElementById('membrePrix').value = membre.prix || '';
                document.getElementById('membreStatut').value = membre.statut || 'En attente';
                document.getElementById('membreDateFin').value = membre.dateFin || '';
                document.getElementById('membreAdresse').value = membre.adresse || '';
                document.getElementById('membreModal').classList.add('show');
            }
        }
        
        function saveMembre() {
            const id = document.getElementById('membreId').value;
            const nom = document.getElementById('membreNom').value.trim();
            const email = document.getElementById('membreEmail').value.trim();
            
            if(!nom || !email) { showToast('Le nom et l\'email sont requis', 'error'); return; }
            
            let abonnement = document.getElementById('membreAbonnement').value;
            let prix = document.getElementById('membrePrix').value;
            if(abonnement === 'Basic' && !prix) prix = 350;
            if(abonnement === 'Pro' && !prix) prix = 550;
            if(abonnement === 'Premium' && !prix) prix = 850;
            
            const membre = {
                nom, email,
                telephone: document.getElementById('membreTel').value,
                dateNaissance: document.getElementById('membreDateNaiss').value,
                abonnement: abonnement,
                prix: prix,
                statut: document.getElementById('membreStatut').value,
                dateFin: document.getElementById('membreDateFin').value,
                adresse: document.getElementById('membreAdresse').value,
                dateModification: new Date().toISOString()
            };
            
            let membres = getMembres();
            if(id) {
                const index = membres.findIndex(m => m.id === parseInt(id));
                if(index !== -1) { membres[index] = { ...membres[index], ...membre }; showToast('Membre modifié avec succès'); }
            } else {
                const newId = membres.length > 0 ? Math.max(...membres.map(m => m.id)) + 1 : 1;
                membres.push({ id: newId, ...membre, date: new Date().toISOString() });
                showToast('Membre ajouté avec succès');
            }
            saveMembres(membres);
            closeModal();
            loadMembres();
        }
        
        function deleteMembre(id) {
            if(confirm('⚠️ Supprimer définitivement ce membre ?')) {
                let membres = getMembres();
                membres = membres.filter(m => m.id !== id);
                saveMembres(membres);
                loadMembres();
                showToast('Membre supprimé');
            }
        }
        
        function closeModal() { document.getElementById('membreModal').classList.remove('show'); }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:${type === 'success' ? '#00FF87' : '#FF3B30'};color:${type === 'success' ? '#0A0A0A' : 'white'};padding:12px 20px;border-radius:12px;z-index:9999;`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function exportToExcel() {
            let csv = "ID,Nom,Email,Téléphone,Abonnement,Prix,Date,Statut\n";
            currentMembres.forEach((m, i) => {
                csv += `${i+1},"${escapeCsv(m.nom || '')}","${escapeCsv(m.email || '')}","${escapeCsv(m.telephone || '')}","${m.abonnement || ''}",${m.prix || 0},"${m.date ? new Date(m.date).toLocaleDateString() : ''}","${m.statut || 'En attente'}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `membres_titanium_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            showToast('Export terminé');
        }
        function escapeCsv(str) { if(!str) return ''; return str.replace(/"/g, '""'); }
        
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const filtered = currentMembres.filter(m => (m.nom && m.nom.toLowerCase().includes(search)) || (m.email && m.email.toLowerCase().includes(search)));
            renderTable(filtered);
        });
        
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        function initData() { if(!localStorage.getItem('inscriptions_gym')) localStorage.setItem('inscriptions_gym', '[]'); }
        
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if(menuToggle) {
            menuToggle.style.display = 'block';
            menuToggle.addEventListener('click', () => { sidebar.classList.toggle('active'); if(sidebar.classList.contains('active')) sidebar.style.left = '0'; else sidebar.style.left = '-280px'; });
        }
        
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); initData(); loadMembres(); });
    </script>
</body>
</html>

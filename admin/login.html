<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Titanium Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,107,0,0.1), transparent);
            border-radius: 50%;
        }
        
        body::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,255,135,0.05), transparent);
            border-radius: 50%;
        }
        
        .login-container {
            background: #111111;
            border-radius: 32px;
            padding: 50px 45px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(255,107,0,0.2);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .logo .icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FF6B00, #FF3B30);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo .icon i {
            font-size: 2rem;
            color: white;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            color: #FF6B00;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
        }
        
        .logo p {
            color: #B0B0B0;
            font-size: 0.75rem;
            letter-spacing: 3px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #FFFFFF;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #FF6B00;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: #0A0A0A;
            color: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #FF6B00;
            box-shadow: 0 0 0 4px rgba(255,107,0,0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B00, #FF3B30);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,107,0,0.3);
            background: linear-gradient(135deg, #FF3B30, #FF6B00);
        }
        
        .error-message {
            background: rgba(255,59,48,0.1);
            color: #FF3B30;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,59,48,0.3);
        }
        
        .error-message.show {
            display: flex;
        }
        
        .info {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            color: #6B6B6B;
        }
        
        .info strong {
            color: #FF6B00;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
            }
            .logo .icon {
                width: 55px;
                height: 55px;
            }
            .logo .icon i {
                font-size: 1.5rem;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="icon">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h1>TITANIUM GYM</h1>
            <p>ESPACE ADMINISTRATEUR</p>
        </div>
        
        <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Identifiants incorrects</span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="admin" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="••••••">
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
            </button>
        </form>
        
        <div class="info">
            <p>🔐 Identifiants par défaut: <strong>admin</strong> / <strong>admin123</strong></p>
            <p style="margin-top: 10px; font-size: 0.7rem;">⚠️ Changez le mot de passe après votre première connexion</p>
        </div>
    </div>
    
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUser', username);
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.classList.add('show');
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        });
    </script>
</body>
</html>
